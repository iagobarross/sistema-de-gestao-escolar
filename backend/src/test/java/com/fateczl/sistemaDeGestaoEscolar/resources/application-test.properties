# 1. Conexão com Banco H2 em Memória
# O MODE=MySQL faz o H2 aceitar sintaxes específicas que você usou, como as Unique Constraints
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Configurações do Hibernate/JPA
# create-drop: Cria as tabelas ao iniciar o teste e as apaga ao finalizar
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. Habilita o Console do H2 (útil para debug se o teste travar)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 4. Configurações de Segurança para Testes
# Garante que o MockMvc não barra as requisições por falta de CSRF durante os testes de Controller
spring.main.allow-bean-definition-overriding=true